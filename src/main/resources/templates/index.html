<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Simple URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #c4d1ec;
            color: #333333;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .dashboard-header p {
            color: #666;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 28px;
        }

        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .icon-blue { background-color: #eef2ff; color: #6366f1; }
        .icon-indigo { background-color: #eef2ff; color: #6366f1; }

        .card-title h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0f172a;
        }

        .card-title p {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 2px;
        }

        form div {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        label span {
            color: #94a3b8;
            font-weight: normal;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #0f172a;
            transition: border-color 0.15s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
            background-color: #ffffff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }
        .btn-indigo { background-color: #6366f1; color: #ffffff; }
        .btn-dark { background-color: #0f172a; color: #ffffff; }

        .result-box {
            margin-top: 24px;
            padding: 20px;
            background-color: #fafafa;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .result-status {
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        .status-blue { color: #6366f1; }

        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-top: 12px;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 0.88rem;
            color: #334155;
            word-break: break-all;
            line-height: 1.4;
        }

        .short-link-border-container {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 6px;
        }

        .result-link-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .result-value a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }

        .result-value a:hover { text-decoration: underline; }

        .btn-copy {
            padding: 6px 12px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #64748b;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-copy:hover { background-color: #f8fafc; color: #334155; }

        .clicks-display-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clicks-label {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
        }

        .clicks-count {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-top: 4px;
        }

        .trend-icon {
            width: 36px;
            height: 36px;
            background-color: #f1f5f9;
            color: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .error-box {
            margin-top: 24px;
            padding: 16px;
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 8px;
            color: #991b1b;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <div class="dashboard-header">
        <h1>Link Management Dashboard</h1>
        <p>Create clean short links and monitor their performance in real time.</p>
    </div>

    <div class="dashboard-grid">

        <div class="card">
            <div class="card-header">
                <div class="icon-wrapper icon-blue">🔗</div>
                <div class="card-title">
                    <h2>Shorten a Link</h2>
                    <p>Paste any long URL to get a short link.</p>
                </div>
            </div>

            <form th:action="@{/shorten-web}" method="POST">
                <div>
                    <label for="longUrl">Destination URL</label>
                    <input type="text" id="longUrl" name="longUrl" placeholder="https://example.com/very/long/path" required>
                </div>
                <div>
                    <label for="customAlias">Custom Alias <span>— optional</span></label>
                    <input type="text" id="customAlias" name="customAlias" placeholder="e.g. promo-2026">
                </div>
                <div>
                    <button type="submit" class="btn btn-indigo">Create Short Link &rarr;</button>
                </div>
            </form>

            <div class="result-box" th:if="${shortUrlResult != null and shortUrlResult != ''}">
                <div class="result-status status-blue">✓ Link created</div>

                <div class="result-label">Original URL</div>
                <div class="result-value" th:text="${originalUrl}"></div>

                <div class="result-label">Short link</div>
                <div class="short-link-border-container">
                    <div class="result-link-row">
                        <div class="result-value">
                            <a th:href="${shortUrlResult}" th:text="${shortUrlResult}" target="_blank"></a>
                        </div>
                        <button class="btn-copy" onclick="navigator.clipboard.writeText(this.previousElementSibling.firstElementChild.href); this.innerText='Copied!'; setTimeout(() => this.innerText='Copy', 2000)">Copy</button>
                    </div>
                </div>
            </div>

            <div class="error-box" th:if="${aliasError != null and aliasError != ''}">
                <span th:text="${aliasError}"></span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="icon-wrapper icon-indigo">📊</div>
                <div class="card-title">
                    <h2>Link Analytics</h2>
                    <p>Enter a short code to view stats.</p>
                </div>
            </div>

            <form th:action="@{/check-stats}" method="POST">
                <input type="hidden" name="existingShortUrl" th:value="${shortUrlResult}">
                <input type="hidden" name="existingOriginalUrl" th:value="${originalUrl}">

                <div>
                    <label for="shortCode">Short Code or Alias</label>
                    <input type="text" id="shortCode" name="shortCode" placeholder="e.g. abc123 or promo-2026" required>
                </div>
                <div>
                    <button type="submit" class="btn btn-dark">Retrieve Analytics ↗</button>
                </div>
            </form>

            <div th:if="${urlStats != null}">

                <div class="clicks-display-card" style="margin-top: 24px;">
                    <div>
                        <div class="clicks-label">Total Clicks</div>
                        <div class="clicks-count" th:text="${urlStats.clickCount}">0</div>
                    </div>
                    <div class="trend-icon">📈</div>
                </div>

                <div class="result-box">
                    <div class="result-label">Original URL</div>
                    <div class="result-value" th:text="${urlStats.originalUrl}"></div>

                    <div class="result-label">Short Link</div>
                    <div class="result-value">
                        <a th:href="${urlStats.shortUrl}" th:text="${urlStats.shortUrl}" target="_blank"></a>
                    </div>

                    <div class="result-label">Created</div>
                    <div class="result-value" th:text="${#temporals.format(urlStats.creationDate, 'dd-MMM-yyyy HH:mm')}"></div>
                </div>
            </div>

            <div class="error-box" th:if="${statsError != null and statsError != ''}">
                <span th:text="${statsError}"></span>
            </div>
        </div>

    </div>
</div>

</body>
</html>
